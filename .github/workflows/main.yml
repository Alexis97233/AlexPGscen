name: CI (Docker-based)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  docker-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t pgscen-test -f Dockerfile .

      - name: Run tests inside container
        run: |
          # Run the tests from the image's internal /tmp/buildworkspace (created at image build time)
          # This avoids mounting the GitHub workspace, which can lead to permission issues
          docker run --rm -e PYTHONPATH=/tmp/buildworkspace pgscen-test \
            bash -c "MAMBA_CACHE_DIR=/tmp/mamba HOME=/tmp micromamba run -n pgscen bash /tmp/buildworkspace/test/test_run.sh"
